name: Bug report
description: Something in the Mnema core is broken or behaving wrong.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please search existing issues first — someone
        may have already hit this. **Do not report security vulnerabilities here** —
        see [SECURITY.md](https://github.com/nbkdoesntknowcoding/mnema/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: When I ..., I expected ..., but instead ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact steps someone else can follow to see the bug.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: The release tag or commit SHA you're running.
      placeholder: e.g. v0.1.0 or 3c6cfb7
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running Mnema?
      options:
        - Docker Compose (self-host quickstart)
        - Docker Compose behind a reverse proxy / HTTPS
        - Local dev (pnpm, outside Docker)
        - Other (describe below)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (e.g. `docker compose logs api`). This is automatically formatted, no backticks needed.
      render: shell
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, environment details, or other context.
