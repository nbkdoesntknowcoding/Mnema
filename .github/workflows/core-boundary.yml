name: core-boundary

# Phase 5 (Open-Core) — the permanent assertion that the public core stays buildable
# and bootable with the enterprise (ee) surface absent. On the public `mnema` repo the
# ee code isn't present at all, so scripts/verify-core-only.sh proving tsc passes with
# the ee entrypoints removed is exactly what keeps the boundary from regressing.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm -r --filter "./packages/**" build
      - name: Core-only boundary check (ee-absent compile)
        working-directory: apps/api
        run: bash scripts/verify-core-only.sh
