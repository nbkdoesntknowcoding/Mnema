# Dependabot config.
#
# Policy: minor/patch version-update PRs only (grouped), plus SECURITY updates.
# Major version bumps are NOT auto-proposed — they carry breaking-change risk and
# are done deliberately. The `version-update:semver-major` ignore scopes to VERSION
# updates only, so Dependabot still opens PRs for CVEs even when the fix is a major.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
