# Dependabot config for the public mirror.
#
# Note: on this public repository, Dependabot security alerts and version-update
# PRs live here directly — they are raised against this repo, not the private
# source-of-truth. Update PRs are reviewed here like any other change.

version: 2
updates:
  # JavaScript / TypeScript dependencies (pnpm workspace).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk minor + patch bumps into a single PR to cut noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by our workflows (kept pinned to SHAs; Dependabot
  # updates the SHA and the trailing version comment together).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Docker base images (docker-compose services / Dockerfiles).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
